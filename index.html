<!DOCTYPE html>
<html>
<head>
  <title>Bagrut 2023 solution</title>
  <style>
    table {
      border-collapse: collapse;
      width: 95%;
      margin: 30px auto;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background-color: #2c3e50;
      color: white;
    }
    td[contenteditable="true"]:focus {
      background-color: #fff8dc;
      outline: 2px solid #f39c12;
    }
  </style>
</head>
<body lang="he" style="text-align: right;">
  <h1><u>שאלה 1</u></h1>
  <img src="1.jpeg">
  <div>סעיף א פתרון</div>
  <table id="editableTable">
    <thead>
      <tr>
        <th>i</th>
        <th>sun</th>
        <th>arr[i]</th>
        <th>arr[i].length</th>
        <th>i < length</th>
      </tr>
    </thead>
    <tbody>
      <!-- 20 rows generated below -->
    </tbody>
  </table>
  <script>
    const tbody = document.querySelector("#editableTable tbody");
    for (let i = 1; i <= 15; i++) {
      const row = document.createElement("tr");
      for (let j = 0; j < 5; j++) {
        const cell = document.createElement("td");
        cell.contentEditable = "true";
        cell.textContent = "";
        row.appendChild(cell);
      }
      tbody.appendChild(row);
    }
  </script>
</body>
</html>
